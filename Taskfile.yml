version: '3'

silent: true

tasks:

  # ---------------------------------------------------------------------------
  # Primary
  # ---------------------------------------------------------------------------

  dev:
    desc: Run the app in dev mode with hot reload
    dir: src-tauri
    cmd: cargo tauri dev --config tauri.dev.conf.json

  build:
    desc: Build a release package (.app / .deb / .AppImage)
    dir: src-tauri
    cmd: cargo tauri build

  install:
    desc: Install frontend dependencies and fetch fonts (run after fresh clone)
    cmds:
      - echo "Installing frontend dependencies..."
      - cd frontend && bun install
      - echo "Fetching fonts..."
      - sh scripts/fetch-fonts.sh
      - echo "Done."

  themes:sync:
    desc: Refresh the curated VSCode theme catalog from tm-themes (run on demand)
    dir: frontend
    cmd: bun run themes:sync

  # ---------------------------------------------------------------------------
  # Hooks (prek orchestrates everything below in one shot)
  # ---------------------------------------------------------------------------

  hooks:
    desc: Run all prek hooks against every tracked file
    cmd: prek run --all-files

  hooks:install:
    desc: Install prek git hooks (commit + pre-push) into .git/hooks
    cmds:
      - prek install
      - prek install --hook-type pre-push

  # ---------------------------------------------------------------------------
  # Checks
  # ---------------------------------------------------------------------------

  typecheck:
    desc: TypeScript type check (frontend)
    dir: frontend
    cmd: bun run typecheck

  check:
    desc: Cargo check (all workspace crates)
    env:
      # Isolate from `task dev`'s target/debug so running a check while dev
      # is live never contends for the build lock (same rationale as
      # `test:rust`). Killing a contending rustc mid-compile corrupts the
      # incremental cache and leaves dev wedged.
      CARGO_TARGET_DIR: target/test
    cmd: cargo check --workspace --locked

  lint:
    desc: Oxlint (frontend)
    dir: frontend
    cmd: bunx oxlint

  lint:toml:
    desc: Taplo format check (TOML files)
    cmd: taplo format --check

  typos:
    desc: Spell check (all files)
    cmd: typos

  deps:unused:
    desc: cargo-machete — report unused dependencies
    cmd: cargo machete

  deps:audit:
    desc: cargo-deny — advisories, licenses, bans, sources
    cmd: cargo deny check

  check:all:
    desc: Run every static check — typecheck, cargo check, clippy, lint, toml, typos, deps
    cmds:
      - task: typecheck
      - task: check
      - task: clippy
      - task: lint
      - task: lint:toml
      - task: typos
      - task: deps:unused

  clippy:
    desc: cargo clippy (all workspace crates, all targets)
    env:
      # Isolated from `target/debug` so `task dev` keeps running while
      # clippy compiles every test target. Same reasoning as `test:rust`.
      CARGO_TARGET_DIR: target/test
    cmd: cargo clippy --workspace --all-targets --locked -- -D warnings

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------

  test:
    desc: Run frontend tests (vitest)
    dir: frontend
    cmd: bun run test

  test:watch:
    desc: Run frontend tests in watch mode
    dir: frontend
    cmd: bun run test:watch

  test:rust:
    desc: Run Rust tests (all workspace crates)
    env:
      CARGO_TARGET_DIR: target/test
    cmd: cargo test --workspace --locked

  test:all:
    desc: Run frontend and Rust tests
    cmds:
      - task: test
      - task: test:rust

  # ---------------------------------------------------------------------------
  # Formatting
  # ---------------------------------------------------------------------------

  fmt:
    desc: Format all code (rustfmt + oxfmt + taplo)
    cmds:
      - cargo fmt --all
      - cd frontend && bunx oxfmt .
      - taplo format

  fmt:check:
    desc: Check formatting without writing (CI-friendly)
    cmds:
      - cargo fmt --all --check
      - cd frontend && bunx oxfmt --check .
      - taplo format --check

  # ---------------------------------------------------------------------------
  # Build helpers
  # ---------------------------------------------------------------------------

  frontend:build:
    desc: Build frontend only (outputs to frontend/dist)
    dir: frontend
    cmd: bun run build

  # ---------------------------------------------------------------------------
  # Maintenance
  # ---------------------------------------------------------------------------

  clean:
    desc: Remove build artifacts (frontend/dist and cargo target)
    cmds:
      - echo "Cleaning frontend dist..."
      - rm -rf frontend/dist
      - echo "Cleaning cargo target..."
      - cargo clean
      - echo "Done."

  clean:frontend:
    desc: Remove frontend/dist only
    cmd: rm -rf frontend/dist

  target:sweep:
    desc: Prune stale artifacts from target/{debug,test,release} without forcing a full rebuild (requires cargo-sweep)
    cmds:
      - echo "Sweeping target/debug (keeping last 14 days)..."
      - CARGO_TARGET_DIR=target/debug cargo sweep --time 14
      - echo "Sweeping target/test (dropping non-current toolchains)..."
      - CARGO_TARGET_DIR=target/test cargo sweep --installed
      - echo "Sweeping target/release (dropping non-current toolchains)..."
      - CARGO_TARGET_DIR=target/release cargo sweep --installed
      - echo "Done."
