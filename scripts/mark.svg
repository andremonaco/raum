<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    RaumLogo mark — white artwork on transparent background.
    Used as the foreground layer in the macOS 26 Liquid Glass icon.
    560x560 centered at (512,512): fills ~54.7% of the 1024px canvas.
    macOS handles the squircle shape and glass material on top of this.
  -->
  <g stroke="white" stroke-width="40" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer border -->
    <rect x="232" y="232" width="560" height="560"/>

    <!-- 3 rays from top-right corner (792, 232) -->
    <line x1="792" y1="232" x2="232" y2="512"/>
    <line x1="792" y1="232" x2="232" y2="792"/>
    <line x1="792" y1="232" x2="512" y2="792"/>

  </g>
</svg>
