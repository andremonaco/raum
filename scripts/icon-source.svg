<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Squircle background: 900x900 centered in 1024x1024 canvas.
    62px transparent margin on all sides — tighter than Apple's
    minimum 100px gutter (used by Safari/Finder) so the overall
    icon reads at the same visual weight as other Dock icons.
    rx="201" ≈ 22.37% of 900px (standard Apple squircle proportion).
  -->
  <rect x="62" y="62" width="900" height="900" rx="201" ry="201" fill="#0a0a0a"/>

  <!--
    Logo art: 420x420 centered at (512,512) inside the 900x900 squircle.
    Mark kept at its canonical 420px size — only the *background* grows
    so the Dock icon's opaque area matches native apps without
    inflating the key-visual itself.
    Grid corners: TL=(302,302)  TR=(722,302)  BR=(722,722)  BL=(302,722)
    2x2 grid midpoints: center=(512,512)
  -->
  <g stroke="white" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer border -->
    <rect x="302" y="302" width="420" height="420"/>

    <!-- 3 rays from top-right corner (722, 302) -->
    <line x1="722" y1="302" x2="302" y2="512"/>
    <line x1="722" y1="302" x2="302" y2="722"/>
    <line x1="722" y1="302" x2="512" y2="722"/>

  </g>
</svg>
