<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Squircle background: 824x824 centered in 1024x1024 canvas.
    100px transparent margin on all sides — Apple HIG spec.
    rx="184" = 22.37% of 824px (standard Apple squircle proportion).
  -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="#0a0a0a"/>

  <!--
    Logo art: 420x420 centered at (512,512) inside the 824x824 squircle.
    Fill ratio: 420/824 = 51% — more breathing room on all sides.
    Grid corners: TL=(302,302)  TR=(722,302)  BR=(722,722)  BL=(302,722)
    2x2 grid midpoints: center=(512,512)
  -->
  <g stroke="white" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer border -->
    <rect x="302" y="302" width="420" height="420"/>

    <!-- 3 rays from top-right corner (722, 302) -->
    <line x1="722" y1="302" x2="302" y2="512"/>
    <line x1="722" y1="302" x2="302" y2="722"/>
    <line x1="722" y1="302" x2="512" y2="722"/>

  </g>
</svg>
