name: release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Fires on every push to main, but only does real work when the
  # previous push was the release-PR merge. In that case it creates the
  # tag + draft GitHub Release for the `raum` package.
  #
  # Release-PR opening is handled by `.github/workflows/propose-release.yml`
  # instead of `release-plz release-pr`. release-plz 0.3.157 can't open
  # the PR for a `publish = false` workspace: its release-pr path looks
  # up the package on crates.io, gets a 404, and silently decides
  # `next_version = current_version` — so feat/fix commits never surface
  # as a release PR. The custom workflow reads conventional commits from
  # git history directly and opens the bump PR from there.
  release:
    name: release-plz tag + GH release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build (${{ matrix.target.name }})
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # Both macOS targets cross-compile on the arm64 runner. The
          # x86_64 macOS `macos-*-intel` pool is sunsetting in Fall 2027
          # (last Intel image is `macos-26-intel`); `cargo build --target`
          # plus the Rust x86_64-apple-darwin toolchain produces an Intel
          # binary on an arm64 host without any Rosetta dance, and keeps
          # working past the Intel runner retirement.
          - { name: macos-arm64, os: macos-latest, triple: aarch64-apple-darwin, args: "--target aarch64-apple-darwin" }
          - { name: macos-x86_64, os: macos-latest, triple: x86_64-apple-darwin, args: "--target x86_64-apple-darwin" }
          - { name: linux-x86_64, os: ubuntu-latest, triple: x86_64-unknown-linux-gnu, args: "" }
    steps:
      - name: resolve raum release tag
        id: tag
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: |
          set -euo pipefail
          tag=$(echo "$RELEASES" | jq -r '.[] | select(.package_name == "raum") | .tag')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "no release entry for package 'raum' in outputs" >&2
            echo "$RELEASES" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          # Check out the commit release-plz tagged, not the branch HEAD,
          # so the bundler sees the version strings that were released.
          ref: ${{ steps.tag.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - name: install linux deps
        if: startsWith(matrix.target.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tmux libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: install frontend
        working-directory: frontend
        run: bun install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple signing/notarization env vars are intentionally omitted
          # until the APPLE_CERTIFICATE / APPLE_ID / etc. secrets are
          # configured. tauri-action with an empty APPLE_CERTIFICATE
          # tries `security import` against an empty cert and the whole
          # macOS build aborts; omitting the env vars makes tauri-action
          # honour bundle.macOS.signingIdentity = "-" (ad-hoc sign) from
          # src-tauri/tauri.conf.json. Restore these envs alongside
          # secret setup when we move to full Developer ID notarization.
          # Tauri updater key for signing the update artifacts:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # release-plz already created a draft GitHub Release for this
          # tag; tauri-action detects it by tag and uploads bundles to it.
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: "raum ${{ steps.tag.outputs.tag }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target.args }}
          projectPath: src-tauri
          updaterJsonPreferNsis: false

  # Flip the GH Release from draft to published once every platform
  # bundle has uploaded successfully. release-plz creates the release
  # as a draft so the build matrix has a window to attach artefacts
  # without a publicly-visible "Latest release, 0 downloads" state;
  # this job is what removes the draft flag once the bundles exist.
  # `fail-fast: false` on the build matrix means a single-target
  # failure lets the other bundles through — the `needs: build` here
  # enforces that ALL targets must succeed before we flip to public.
  publish-release:
    name: publish GH release
    needs: [release, build]
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: resolve raum release tag
        id: tag
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: |
          set -euo pipefail
          tag=$(echo "$RELEASES" | jq -r '.[] | select(.package_name == "raum") | .tag')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "no release entry for package 'raum' in outputs" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: flip draft → published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest

  # Bump the Homebrew Cask in `andremonaco/homebrew-raum` after the DMGs
  # are attached and the release is public (so the
  # releases/download/<tag>/<asset> URL template in the cask resolves).
  # Runs only when the tap PAT is configured — absence of the secret
  # is a clean no-op so forks don't fail CI.
  bump-homebrew:
    name: bump homebrew cask
    needs: [release, build, publish-release]
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: resolve raum release tag
        id: tag
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: |
          set -euo pipefail
          tag=$(echo "$RELEASES" | jq -r '.[] | select(.package_name == "raum") | .tag')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "no release entry for package 'raum' in outputs" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: skip if tap token is missing
        id: gate
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew bump" >&2
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      # Check out the raum source at the freshly-cut tag so the cask
      # template under `packaging/homebrew/Casks/raum.rb` is available
      # to the `update cask` step below. Without this the workspace is
      # empty and `cp packaging/... tap/...` fails with "No such file
      # or directory" (v0.1.1 was the first release to exercise this
      # path with the tap token configured).
      - name: checkout raum at release tag
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: checkout tap
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: andremonaco/homebrew-raum
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: download DMGs and compute sha256
        if: steps.gate.outputs.run == 'true'
        id: hashes
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
          # `gh release download` hits the REST API
          # `/repos/.../releases/assets/{id}` endpoint with this token,
          # which is required for *draft* releases. This job runs AFTER
          # `publish-release` has flipped the draft to public, so in
          # principle the direct `releases/download/<tag>/<asset>` URL
          # would also work — we keep the API path because it handles
          # the brief window (rare, but possible) where the publish
          # call returns before GitHub's CDN has propagated the public
          # URL, and because it's the authorization-token path for
          # anything in a private/draft state.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          arm_dmg="raum_${VERSION}_aarch64.dmg"
          x64_dmg="raum_${VERSION}_x64.dmg"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "$arm_dmg" --pattern "$x64_dmg" --clobber
          arm_sha=$(sha256sum "$arm_dmg" | cut -d' ' -f1)
          x64_sha=$(sha256sum "$x64_dmg" | cut -d' ' -f1)
          echo "arm=${arm_sha}" >> "$GITHUB_OUTPUT"
          echo "x64=${x64_sha}" >> "$GITHUB_OUTPUT"

      - name: update cask
        if: steps.gate.outputs.run == 'true'
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          ARM_SHA: ${{ steps.hashes.outputs.arm }}
          X64_SHA: ${{ steps.hashes.outputs.x64 }}
        run: |
          set -euo pipefail
          # Copy the template and patch version + per-arch sha256.
          cp packaging/homebrew/Casks/raum.rb tap/Casks/raum.rb
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("tap/Casks/raum.rb")
          text = p.read_text()
          text = re.sub(r'version "[^"]+"', f'version "{os.environ["VERSION"]}"', text, count=1)
          text = re.sub(
              r'sha256 arm:\s+"[^"]+",\s*\n\s*intel:\s+"[^"]+"',
              f'sha256 arm:   "{os.environ["ARM_SHA"]}",\n         intel: "{os.environ["X64_SHA"]}"',
              text,
              count=1,
          )
          p.write_text(text)
          PY

      - name: open + merge tap PR
        if: steps.gate.outputs.run == 'true'
        working-directory: tap
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          branch="bump-raum-${VERSION}"
          git config user.name "raum-release-bot"
          git config user.email "release-bot@raum.local"
          git checkout -b "$branch"
          git add Casks/raum.rb
          git commit -m "raum ${VERSION}"
          git push origin "$branch" --force
          # Create the PR (idempotent — `|| gh pr edit` handles a re-run
          # of the same release where the branch already has an open PR),
          # then merge it immediately. The tap repo has no CI and no
          # branch protection; the PR is purely an audit-trail convention.
          gh pr create \
            --title "raum ${VERSION}" \
            --body "Automated cask bump for raum ${VERSION}." \
            --base main \
            --head "$branch" \
          || gh pr edit "$branch" --title "raum ${VERSION}"
          gh pr merge "$branch" --merge --delete-branch
