name: release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Opens / refreshes the "release PR" whenever user-visible commits
  # land on main. The PR proposes a version bump; the maintainer edits
  # and merges it when ready.
  release-pr:
    name: release-plz PR
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Fires on every push to main, but only does real work when the
  # previous push was the release-PR merge. In that case it creates the
  # tag + draft GitHub Release for the `raum` package.
  release:
    name: release-plz tag + GH release
    runs-on: ubuntu-22.04
    outputs:
      released: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build (${{ matrix.target.name }})
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # Both macOS targets cross-compile on the arm64 runner. The
          # `macos-13` Intel pool is being wound down by GitHub and queue
          # times routinely exceed two hours; `cargo build --target` plus
          # the Rust x86_64-apple-darwin toolchain produces an Intel
          # binary on an arm64 host without any Rosetta dance.
          - { name: macos-arm64, os: macos-14, triple: aarch64-apple-darwin, args: "--target aarch64-apple-darwin" }
          - { name: macos-x86_64, os: macos-14, triple: x86_64-apple-darwin, args: "--target x86_64-apple-darwin" }
          - { name: linux-x86_64, os: ubuntu-22.04, triple: x86_64-unknown-linux-gnu, args: "" }
    steps:
      - name: resolve raum release tag
        id: tag
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: |
          set -euo pipefail
          tag=$(echo "$RELEASES" | jq -r '.[] | select(.package_name == "raum") | .tag')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "no release entry for package 'raum' in outputs" >&2
            echo "$RELEASES" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          # Check out the commit release-plz tagged, not the branch HEAD,
          # so the bundler sees the version strings that were released.
          ref: ${{ steps.tag.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - name: install linux deps
        if: startsWith(matrix.target.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tmux libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: install frontend
        working-directory: frontend
        run: bun install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple signing/notarization env vars are intentionally omitted
          # until the APPLE_CERTIFICATE / APPLE_ID / etc. secrets are
          # configured. tauri-action with an empty APPLE_CERTIFICATE
          # tries `security import` against an empty cert and the whole
          # macOS build aborts; omitting the env vars makes tauri-action
          # honour bundle.macOS.signingIdentity = "-" (ad-hoc sign) from
          # src-tauri/tauri.conf.json. Restore these envs alongside
          # secret setup when we move to full Developer ID notarization.
          # Tauri updater key for signing the update artifacts:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # release-plz already created a draft GitHub Release for this
          # tag; tauri-action detects it by tag and uploads bundles to it.
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: "raum ${{ steps.tag.outputs.tag }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target.args }}
          projectPath: src-tauri
          updaterJsonPreferNsis: false

  # Bump the Homebrew Cask in `andremonaco/homebrew-raum` after the DMGs
  # are attached. Runs only when the tap PAT is configured — absence of
  # the secret is a clean no-op so forks don't fail CI.
  bump-homebrew:
    name: bump homebrew cask
    needs: [release, build]
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: resolve raum release tag
        id: tag
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: |
          set -euo pipefail
          tag=$(echo "$RELEASES" | jq -r '.[] | select(.package_name == "raum") | .tag')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "no release entry for package 'raum' in outputs" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: skip if tap token is missing
        id: gate
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew bump" >&2
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout tap
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: andremonaco/homebrew-raum
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: download DMGs and compute sha256
        if: steps.gate.outputs.run == 'true'
        id: hashes
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
          # `gh release download` hits the REST API
          # `/repos/.../releases/assets/{id}` endpoint with this token,
          # which is required for *draft* releases. The public
          # `releases/download/<tag>/<asset>` URL 404s until the release
          # is published, so the previous `curl`-based approach broke
          # for every release here (we publish the draft only after a
          # smoke test).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          arm_dmg="raum_${VERSION}_aarch64.dmg"
          x64_dmg="raum_${VERSION}_x64.dmg"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "$arm_dmg" --pattern "$x64_dmg" --clobber
          arm_sha=$(sha256sum "$arm_dmg" | cut -d' ' -f1)
          x64_sha=$(sha256sum "$x64_dmg" | cut -d' ' -f1)
          echo "arm=${arm_sha}" >> "$GITHUB_OUTPUT"
          echo "x64=${x64_sha}" >> "$GITHUB_OUTPUT"

      - name: update cask
        if: steps.gate.outputs.run == 'true'
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          ARM_SHA: ${{ steps.hashes.outputs.arm }}
          X64_SHA: ${{ steps.hashes.outputs.x64 }}
        run: |
          set -euo pipefail
          # Copy the template and patch version + per-arch sha256.
          cp packaging/homebrew/Casks/raum.rb tap/Casks/raum.rb
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("tap/Casks/raum.rb")
          text = p.read_text()
          text = re.sub(r'version "[^"]+"', f'version "{os.environ["VERSION"]}"', text, count=1)
          text = re.sub(
              r'sha256 arm:\s+"[^"]+",\s*\n\s*intel:\s+"[^"]+"',
              f'sha256 arm:   "{os.environ["ARM_SHA"]}",\n         intel: "{os.environ["X64_SHA"]}"',
              text,
              count=1,
          )
          p.write_text(text)
          PY

      - name: open tap PR
        if: steps.gate.outputs.run == 'true'
        working-directory: tap
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          branch="bump-raum-${VERSION}"
          git config user.name "raum-release-bot"
          git config user.email "release-bot@raum.local"
          git checkout -b "$branch"
          git add Casks/raum.rb
          git commit -m "raum ${VERSION}"
          git push origin "$branch" --force
          gh pr create \
            --title "raum ${VERSION}" \
            --body "Automated cask bump for raum ${VERSION}." \
            --base main \
            --head "$branch" || \
          gh pr edit "$branch" --title "raum ${VERSION}" || true
