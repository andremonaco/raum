name: ci
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Single lint/format gate — runs every prek hook against every file.
  # Keeps CI and local (task hooks) in lockstep.
  # ---------------------------------------------------------------------------
  hooks:
    name: hooks (prek)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: ". -> target" }
      - uses: oven-sh/setup-bun@v2
      - name: install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: install prek
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/j178/prek/releases/latest/download/prek-installer.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: install Rust toolbelt
        run: cargo install --locked typos-cli taplo-cli cargo-deny cargo-machete
      - name: prek run --all-files (incl. pre-push stage)
        run: prek run --all-files --hook-stage pre-push

  # ---------------------------------------------------------------------------
  # Rust matrix — build + test on every target.
  # Lint/format is handled by the hooks job above.
  # ---------------------------------------------------------------------------
  rust:
    name: rust (${{ matrix.target.name }})
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: macos-arm64, os: macos-14, triple: aarch64-apple-darwin }
          - { name: macos-x86_64, os: macos-13, triple: x86_64-apple-darwin }
          - { name: linux-x86_64, os: ubuntu-22.04, triple: x86_64-unknown-linux-gnu }
          - { name: linux-arm64, os: ubuntu-22.04-arm, triple: aarch64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@v4
      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}
      - name: install linux deps
        if: startsWith(matrix.target.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tmux libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: install macOS deps
        if: startsWith(matrix.target.os, 'macos')
        run: brew install tmux
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: ". -> target" }
      - name: setup bun (for tauri.conf.json beforeBuildCommand)
        uses: oven-sh/setup-bun@v2
      - name: install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: cargo build
        run: cargo build --workspace --locked
      - name: cargo test
        run: cargo test --workspace --locked

  # ---------------------------------------------------------------------------
  # Frontend — typecheck + vitest. Lint/format lives in the hooks job.
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: install
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: typecheck
        working-directory: frontend
        run: bun run typecheck
      - name: test
        working-directory: frontend
        run: bun run test
